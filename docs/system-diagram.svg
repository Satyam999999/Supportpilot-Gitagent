<svg width="680" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User Query -->
  <rect x="240" y="30" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#3C3489">User query</text>

  <line x1="340" y1="74" x2="340" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Intent Classifier -->
  <rect x="220" y="108" width="240" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="130" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#085041">Intent classifier</text>

  <path d="M280 152 L280 196" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M400 152 L400 196" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Memory-Aware Query Rewriter -->
  <rect x="60" y="196" width="220" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="170" y="216" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#0C447C">Memory-aware</text>
  <text x="170" y="234" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#0C447C">query rewriter</text>

  <!-- Risk and Policy Check -->
  <rect x="400" y="196" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="510" y="216" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#712B13">Risk and policy</text>
  <text x="510" y="234" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#712B13">check</text>

  <line x1="170" y1="252" x2="170" y2="310" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Hybrid Retriever -->
  <rect x="60" y="310" width="220" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="170" y="330" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#0C447C">Hybrid retriever</text>
  <text x="170" y="350" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#378ADD">Top-K knowledge base</text>

  <path d="M120 366 L120 420" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M220 366 L220 420" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Grounded Response Generator -->
  <rect x="30" y="420" width="175" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="117" y="440" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#27500A">Grounded response</text>
  <text x="117" y="458" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#27500A">generator</text>

  <!-- Confidence Scorer -->
  <rect x="220" y="420" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="300" y="448" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#633806">Confidence scorer</text>

  <line x1="300" y1="476" x2="300" y2="520" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Risk/Policy right-side connector to Escalation Decision -->
  <path d="M510 252 L510 548 L400 548" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Escalation Decision -->
  <rect x="200" y="520" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="300" y="540" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#712B13">Escalation decision</text>
  <text x="300" y="558" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Risk / policy signal</text>

  <line x1="300" y1="576" x2="300" y2="620" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Billing Intent? -->
  <rect x="215" y="620" width="170" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="300" y="642" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#444441">Billing intent?</text>

  <line x1="300" y1="664" x2="300" y2="700" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="312" y="685" font-size="12" dominant-baseline="central" fill="#888780">Yes</text>

  <!-- fetch_user_subscription -->
  <rect x="185" y="700" width="230" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="300" y="720" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#085041">Tool: fetch_user_</text>
  <text x="300" y="738" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#085041">subscription</text>

  <path d="M250 756 L250 800" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M350 756 L430 800" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Grounded Response to Final Answer connector -->
  <path d="M117 476 L117 826 L130 826" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Final Answer with Citations -->
  <rect x="130" y="800" width="210" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="235" y="820" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#27500A">Final answer</text>
  <text x="235" y="838" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">with citations</text>

  <!-- Escalation Summary -->
  <rect x="380" y="800" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="470" y="820" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#712B13">Escalation</text>
  <text x="470" y="838" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#712B13">summary</text>

  <path d="M235 856 L235 900 L300 900" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M470 856 L470 900 L400 900" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Response Payload -->
  <rect x="220" y="890" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="320" y="912" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#3C3489">Response payload</text>

  <line x1="320" y1="934" x2="320" y2="950" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Short-Term Memory Buffer -->
  <rect x="205" y="950" width="230" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="320" y="972" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#444441">Short-term memory buffer</text>
</svg>
