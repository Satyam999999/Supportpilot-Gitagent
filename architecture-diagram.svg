<svg width="680" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User query -->
  <rect x="240" y="30" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#3C3489">User query</text>

  <line x1="340" y1="74" x2="340" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- SupportPilot agent core -->
  <rect x="200" y="108" width="280" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="130" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#085041">SupportPilot agent core</text>

  <line x1="340" y1="152" x2="340" y2="186" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Intent classification -->
  <rect x="210" y="186" width="260" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="208" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#0C447C">Intent classification</text>

  <line x1="340" y1="230" x2="340" y2="264" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Hybrid retrieval -->
  <rect x="185" y="264" width="310" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="284" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#0C447C">Hybrid retrieval</text>
  <text x="340" y="304" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Semantic + BM25 + lexical</text>

  <line x1="340" y1="320" x2="340" y2="354" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Confidence + policy risk scoring -->
  <rect x="160" y="354" width="360" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="374" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#633806">Confidence + policy risk scoring</text>
  <text x="340" y="394" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Evaluates confidence and policy flags</text>

  <line x1="340" y1="410" x2="340" y2="444" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Escalate? -->
  <rect x="255" y="444" width="170" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="466" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#444441">Escalate?</text>

  <!-- No branch -->
  <path d="M255 466 L140 466 L140 524" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="192" y="459" text-anchor="middle" font-size="12" fill="#888780">No</text>

  <!-- Yes branch -->
  <path d="M425 466 L540 466 L540 524" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="456" y="459" text-anchor="middle" font-size="12" fill="#888780">Yes</text>

  <!-- Billing tool -->
  <rect x="50" y="524" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="140" y="544" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#085041">Billing tool</text>
  <text x="140" y="562" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">fetch_user_subscription</text>

  <!-- Escalation summary -->
  <rect x="450" y="524" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="540" y="552" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#712B13">Escalation summary</text>

  <!-- Merge to structured response -->
  <path d="M140 580 L140 630 L255 630" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M540 580 L540 630 L425 630" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Structured response -->
  <rect x="215" y="612" width="250" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="634" text-anchor="middle" dominant-baseline="central" font-weight="500" fill="#27500A">Structured response</text>

  <!-- Lyzr Components subgraph -->
  <rect x="40" y="688" width="600" height="34" rx="10" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="5 4" opacity="0.5"/>
  <text x="48" y="680" font-size="11" fill="#888780" font-weight="500">Lyzr components</text>

  <rect x="52" y="694" width="156" height="22" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="705" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3C3489">ADK-compatible manifest</text>

  <rect x="222" y="694" width="156" height="22" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="300" y="705" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3C3489">Streamlit studio UI</text>

  <rect x="392" y="694" width="238" height="22" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="511" y="705" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3C3489">Resolve + triage as separate skills</text>

  <!-- Dashed connector from agent core to subgraph -->
  <line x1="340" y1="152" x2="340" y2="678" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
</svg>
